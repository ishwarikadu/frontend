<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <title>Approved Matches</title>

  <link rel="stylesheet" href="css/admin-approved.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/global.css">

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

</head>

<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <h1>Admin Control Panel</h1>
    <div class="profile-section">
      <div id="profileCircle" class="profile-circle"></div>
      <span id="profileName"></span>
    </div>
  </div>

  <!-- Nav -->
  <div class="admin-nav">

    <button onclick="window.location.href='admin-dashboard.html'">
      <span class="material-symbols-outlined">pending_actions</span>
      Pending
    </button>

    <button class="active">
      <span class="material-symbols-outlined">task_alt</span>
      Approved
    </button>

    <button onclick="window.location.href='admin-rejected.html'">
      <span class="material-symbols-outlined">cancel</span>
      Rejected
    </button>

    <button onclick="window.location.href='admin-unmatched.html'">
      <span class="material-symbols-outlined">help</span>
      Unmatched
    </button>

  </div>

  <!-- Content -->
  <div class="matches-container">

    <h2>Approved Matches</h2>

    <!-- Filter Bar -->
    <div class="filter-bar">

      <input
        type="text"
        id="filterLocation"
        class="filter-input"
        placeholder="Location..."
      />

      <input
        type="text"
        id="filterSearch"
        class="filter-input"
        placeholder="Search item name..."
      />

      <input
        type="number"
        id="filterMinScore"
        class="filter-input"
        placeholder="Min score"
        min="0" max="1" step="0.1"
      />

      <input
        type="number"
        id="filterMaxScore"
        class="filter-input"
        placeholder="Max score"
        min="0" max="1" step="0.1"
      />

      <input
        type="date"
        id="filterDateFrom"
        class="filter-input"
        title="Approved from"
      />

      <input
        type="date"
        id="filterDateTo"
        class="filter-input"
        title="Approved to"
      />

      <button id="applyFilters" class="filter-btn apply">
        <span class="material-symbols-outlined">search</span>
        Search
      </button>

      <button id="clearFilters" class="filter-btn clear">
        <span class="material-symbols-outlined">close</span>
        Clear
      </button>

    </div>

    <div id="approvedMatches" class="matches-grid"></div>

  </div>

  <script type="module" src="javascript/admin-approved.js"></script>
  <script src="javascript/auth.js"></script>
  <script src="javascript/scripts.js"></script>

  <script>
    const username  = localStorage.getItem("name") || "Admin";
    const firstName = username.split(" ")[0];
    const initial   = firstName.charAt(0).toUpperCase();

    document.getElementById("profileCircle").innerText = initial;
    document.getElementById("profileName").innerText   = firstName;
  </script>

</body>
</html>
