<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejected Matches</title>
  <link rel="stylesheet" href="css/admin-rejected.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <h1>Admin Control Panel</h1>
    <div class="profile-section">
      <div class="profile-circle" id="profileCircle">I</div>
      <span id="profileName">Ishwari</span>
    </div>
  </div>

  <!-- Nav -->
  <nav class="admin-nav">

    <button onclick="window.location.href='admin-dashboard.html'">
      <span class="material-symbols-outlined">inbox</span>
      Pending
    </button>

    <button onclick="window.location.href='admin-approved.html'">
      <span class="material-symbols-outlined">check_circle</span>
      Approved
    </button>

    <button class="active">
      <span class="material-symbols-outlined">cancel</span>
      Rejected
    </button>

    <button onclick="window.location.href='admin-unmatched.html'">
      <span class="material-symbols-outlined">block</span>
      Unmatched
    </button>

  </nav>

  <!-- Content -->
  <div class="matches-container">

    <h2>Rejected Matches</h2>

    <div class="matches-grid" id="matchesContainer">
      <div class="loading-state">
        <span class="material-symbols-outlined spin">autorenew</span>
        <p>Loading rejected matches...</p>
      </div>
    </div>

  </div>

  <script type="module" src="javascript/admin-rejected.js"></script>

</body>
</html>
