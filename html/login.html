<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Campus Lost & Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>


<div class="login-container">
    <div class="login-card">
        <h2 class="login-title">
  <span class="material-symbols-outlined">account_circle</span>
  Login
</h2>
        <p class="subtitle">Access your account</p>

        <input type="email" id="email" placeholder="Email">

    <div class="password-wrapper">
    <input type="password" id="password" placeholder="Password">

    <span class="material-symbols-outlined toggle-icon" onclick="togglePassword()">
        visibility
    </span>
</div>

        <button class="login-btn" onclick="login()">Login</button>

        <p class="register-link">
            New to Campus Lost & Found?
            <a href="register.html"><u>Register</u></a>
        </p>

        <p id="msg" class="message"></p>
    </div>
</div>
<script src="javascript/auth.js" defer></script>

</body>
</html>
