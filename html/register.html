<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Campus Lost & Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="css/index.css">
</head>

<body>

<div class="login-card">

    <h2>Create Account</h2>
    <p class="subtitle">Join the campus system</p>

    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="prn" placeholder="Mobile Number">

    <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password">
        <span class="material-symbols-outlined toggle-icon" onclick="togglePassword()">
            visibility
        </span>
    </div>
<div class="custom-select" onclick="toggleDropdown(event)">
    <div class="selected" id="selectedRole">Select Role</div>
    <div class="options" id="roleOptions">
        <div onclick="selectRole(event, 'user')">User</div>
        <div onclick="selectRole(event, 'admin')">Admin</div>
    </div>


<input type="hidden" id="role">
</div>

    <button class="login-btn" onclick="registerUser()">Register</button>

    <p class="register-link">
        Already have an account?
        <a href="login.html">Login</a>
    </p>

    <p id="reg_msg" class="message"></p>

</div>
<script src="javascript/api.js"></script>
<script src="javascript/auth.js" defer></script>

</body>
</html>
