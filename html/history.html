<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Reports | Campus Lost & Found</title>

  <link rel="stylesheet" href="css/lost.css">
  <link rel="stylesheet" href="css/history.css">
  <link rel="stylesheet" href="css/global.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>

<body>

<nav class="navbar">
  <div class="brand">
    <span class="material-symbols-outlined">inventory</span>
    Campus Lost & Found
  </div>

  <div class="profile-section">
    <div id="profileCircle" class="profile-circle"></div>
    <span id="profileName"></span>
    <div class="top-bar">
      <button class="nav-btn" onclick="window.location.href='dashboard.html'">
        <span class="material-symbols-outlined">home</span>
        Dashboard
      </button>
    </div>
    <button class="logout-btn" onclick="logout()">
      <span class="material-symbols-outlined">logout</span>
      Logout
    </button>
  </div>
</nav>

<div class="reports-container">
  <h2 class="reports-title">All Reports</h2>
  <div class="tab-bar">
  <button id="tabMyReports" class="tab-btn active">My Reports</button>
  <button id="tabAllReports" class="tab-btn">All Reports</button>
</div>

  <!-- Filter Bar -->
  <div class="filter-bar">

    <select id="filterStatus" class="filter-input">
      <option value="">All Statuses</option>
      <option value="LOST">Lost</option>
      <option value="FOUND">Found</option>
      <option value="RETURNED">Returned</option>
    </select>

    <select id="filterCategory" class="filter-input">
      <option value="">All Categories</option>
      <option value="PHONE">Phone</option>
      <option value="LAPTOP">Laptop</option>
      <option value="WALLET">Wallet</option>
      <option value="KEYS">Keys</option>
      <option value="BAG">Bag</option>
      <option value="OTHER">Other</option>
    </select>

    <input
      type="text"
      id="filterLocation"
      class="filter-input"
      placeholder="Location..."
    />

    <input
      type="date"
      id="filterDateFrom"
      class="filter-input"
      title="Date from"
    />

    <input
      type="date"
      id="filterDateTo"
      class="filter-input"
      title="Date to"
    />

    <button id="applyFilters" class="filter-btn apply">
      <span class="material-symbols-outlined">search</span>
      Search
    </button>

    <button id="clearFilters" class="filter-btn clear">
      <span class="material-symbols-outlined">close</span>
      Clear
    </button>

  </div>

  <div id="reportsGrid" class="reports-grid"></div>
</div>

<script type="module" src="javascript/history.js"></script>
<script src="javascript/auth.js"></script>
<script src="javascript/scripts.js"></script>

<script>
  const username = localStorage.getItem("name") || "User";
  const firstName = username.split(" ")[0];
  const initial = firstName.charAt(0).toUpperCase();

  const circle = document.getElementById("profileCircle");
  const nameTag = document.getElementById("profileName");

  if (circle) circle.innerHTML = initial;
  if (nameTag) nameTag.innerHTML = firstName;
</script>

</body>
</html>
